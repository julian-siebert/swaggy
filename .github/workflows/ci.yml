name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: short

jobs:
  format:
    name: Check formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all --check

  test:
    name: Test ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: macos-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Build
        run: cargo build --all-targets --locked

      - name: Run tests
        run: cargo test --all-targets --locked

  cargo-deny:
    name: Audit dependencies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  msrv:
    name: Verify minimum supported Rust version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Read MSRV from Cargo.toml
        id: msrv
        run: |
          msrv=$(grep -m1 '^rust-version = ' Cargo.toml | sed -E 's/rust-version = "(.+)"/\1/' || true)
          if [ -z "$msrv" ]; then
            echo "::notice::No rust-version field in Cargo.toml; skipping MSRV check"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "version=$msrv" >> "$GITHUB_OUTPUT"
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install MSRV toolchain
        if: steps.msrv.outputs.skip == 'false'
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ steps.msrv.outputs.version }}

      - name: Set up Rust build cache
        if: steps.msrv.outputs.skip == 'false'
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Build with MSRV
        if: steps.msrv.outputs.skip == 'false'
        run: cargo build --locked

  shellcheck:
    name: Lint shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Run shellcheck
        run: |
          # Find all shell scripts and check them
          if find . -type f \( -name '*.sh' -o -name 'install' \) \
              -not -path './target/*' \
              -not -path './.git/*' \
              | xargs -r shellcheck --severity=warning; then
            echo "::notice::shellcheck passed"
          else
            exit 1
          fi
