name: Release

on:
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+*"]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0

jobs:
  validate-release-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Extract and validate version from tag
        id: extract
        run: |
          tag="${GITHUB_REF_NAME}"
          if ! [[ "$tag" =~ ^v(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)(-[A-Za-z0-9.-]+)?(\+[A-Za-z0-9.-]+)?$ ]]; then
            echo "::error::Tag '$tag' is not a valid semver tag (expected vX.Y.Z)"
            exit 1
          fi
          version="${tag#v}"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "::notice::Releasing swaggy v$version"

      - name: Verify Cargo.toml version matches tag
        env:
          EXPECTED: ${{ steps.extract.outputs.version }}
        run: |
          actual=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.+)"/\1/')
          if [ "$actual" != "$EXPECTED" ]; then
            echo "::error::Cargo.toml version is '$actual' but tag implies '$EXPECTED'"
            echo "::error::Bump the version in Cargo.toml before tagging."
            exit 1
          fi

  build-release-binaries:
    name: Build ${{ matrix.target }}
    needs: validate-release-tag
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
            cross: true
          - target: aarch64-apple-darwin
            runner: macos-latest
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            ext: .exe
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Set up Rust build cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked

      - name: Build release binary
        shell: bash
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --locked --target ${{ matrix.target }}
          else
            cargo build --release --locked --target ${{ matrix.target }}
          fi

      - name: Stage binary and compute checksum
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p staging
          binary="swaggy${{ matrix.ext || '' }}"
          cp "target/${{ matrix.target }}/release/$binary" "staging/$binary"
          cd staging
          if command -v sha256sum >/dev/null; then
            sha256sum "$binary" > "$binary.sha256"
          else
            shasum -a 256 "$binary" > "$binary.sha256"
          fi

      - name: Upload binary artifact
        uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.target }}
          path: staging/
          retention-days: 7
          if-no-files-found: error

  publish-to-package-repo:
    name: Publish binaries to pkgs.julian-siebert.de
    needs: [validate-release-tag, build-release-binaries]
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://pkgs.julian-siebert.de/swaggy/${{ needs.validate-release-tag.outputs.version }}/
    steps:
      - name: Check out package repository
        uses: actions/checkout@v6
        with:
          repository: julian-siebert/pkgs
          token: ${{ secrets.PKGS_DEPLOY_TOKEN }}
          path: pkgs

      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: binary-*

      - name: Stage binaries into versioned directory tree
        env:
          VERSION: ${{ needs.validate-release-tag.outputs.version }}
        run: |
          set -euo pipefail
          for dir in artifacts/binary-*; do
            target="${dir#artifacts/binary-}"
            dest="pkgs/swaggy/$VERSION/$target"
            mkdir -p "$dest"
            cp -v "$dir"/* "$dest/"
          done

      - name: Generate version manifest
        env:
          VERSION: ${{ needs.validate-release-tag.outputs.version }}
        run: |
          cd "pkgs/swaggy/$VERSION"
          python3 - <<'EOF' > manifest.json
          import json, os, datetime
          version = os.environ["VERSION"]
          manifest = {
              "version": version,
              "released": datetime.datetime.now(datetime.timezone.utc)
                          .strftime("%Y-%m-%dT%H:%M:%SZ"),
              "targets": {},
          }
          for target in sorted(os.listdir(".")):
              if not os.path.isdir(target):
                  continue
              files = os.listdir(target)
              binary = next((f for f in files if not f.endswith(".sha256")), None)
              if not binary:
                  continue
              with open(os.path.join(target, binary + ".sha256")) as f:
                  sha = f.read().split()[0]
              manifest["targets"][target] = {"binary": binary, "sha256": sha}
          print(json.dumps(manifest, indent=2))
          EOF

      - name: Update 'latest' pointer
        env:
          VERSION: ${{ needs.validate-release-tag.outputs.version }}
        run: |
          set -euo pipefail
          rm -rf pkgs/swaggy/latest
          cp -r "pkgs/swaggy/$VERSION" pkgs/swaggy/latest

      - name: Commit and push to package repository
        working-directory: pkgs
        env:
          VERSION: ${{ needs.validate-release-tag.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add swaggy/
          if git diff --cached --quiet; then
            echo "::warning::No changes to publish"
            exit 0
          fi
          git commit -m "release: swaggy v${VERSION}"
          git push

  publish-github-release:
    name: Publish GitHub release
    needs: [validate-release-tag, build-release-binaries]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all binary artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: binary-*

      - name: Bundle release assets
        env:
          VERSION: ${{ needs.validate-release-tag.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p release-assets
          for dir in artifacts/binary-*; do
            target="${dir#artifacts/binary-}"
            archive="swaggy-v${VERSION}-${target}"
            if [[ "$target" == *windows* ]]; then
              (cd "$dir" && zip -r "../../release-assets/${archive}.zip" .)
            else
              tar -czf "release-assets/${archive}.tar.gz" -C "$dir" .
            fi
          done
          (cd release-assets && sha256sum * > SHA256SUMS)
          ls -la release-assets/

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          files: release-assets/*
          generate_release_notes: true
          fail_on_unmatched_files: true
